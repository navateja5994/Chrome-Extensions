<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Banking Phishing Detector</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-mute: #9ca3af;
      --primary: linear-gradient(135deg, #6366f1, #3b82f6);
      --primary-hover: linear-gradient(135deg, #4f46e5, #2563eb);
      --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      --safe: #10b981;
      --safe-bg: rgba(16, 185, 129, 0.15);
      --safe-border: rgba(16, 185, 129, 0.2);
      
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.15);
      --warning-border: rgba(245, 158, 11, 0.2);
      
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.15);
      --danger-border: rgba(239, 68, 68, 0.2);
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      box-sizing: border-box;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    header {
      text-align: center;
    }
    
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(to right, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 11px;
      color: var(--text-mute);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    
    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }
    
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    #result {
      margin-top: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
    }
    
    .status-badge.safe {
      background: var(--safe-bg);
      border: 1px solid var(--safe-border);
      color: var(--safe);
    }
    
    .status-badge.warning {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      color: var(--warning);
    }
    
    .status-badge.danger {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger);
    }
    
    .risk-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }
    
    .risk-val {
      font-size: 14px;
      font-weight: 700;
    }
    
    .details {
      font-size: 12px;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    
    .details-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    
    .details-desc {
      color: var(--text-mute);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Banking Detector</h1>
      <div class="subtitle">Phishing Threat Analysis</div>
    </header>
    <div class="card">
      <button id="scan">Scan Current Page</button>
      <div id="result"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
